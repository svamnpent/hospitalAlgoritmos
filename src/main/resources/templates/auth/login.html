<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Hospital De La Salud — Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="icono-login">
            <img th:src="@{/imagenes/6210017.png}" alt="Icono empleado"/>
        </div>
        <h2> Hospital De la Salud</h2>

        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username"
                       placeholder="Ingrese su usuario" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password"
                       placeholder="Ingrese su contraseña" required/>
            </div>
            <button type="submit" class="btn btn-primary">INGRESAR</button>
        </form>
        <a th:href="@{/elige}" class="link-volver">← Volver a elegir acceso</a>
    </div>

</div>
</body>
</html>
